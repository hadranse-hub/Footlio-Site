<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footlio — Espace Joueur</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ink:     #0B0F1A;
            --blue:    #1246E6;
            --smoke:   #F7F8FC;
            --mist:    #E8ECF8;
            --white:   #FFFFFF;
            --mid:     #6B7499;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--smoke); color: var(--ink); overflow-x: hidden; }

        /* NAV */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 56px; height: 72px;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--mist);
        }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-logo-text { font-family: 'Fraunces', serif; font-weight: 700; font-size: 22px; color: var(--ink); }
        .nav-logo-text span { color: var(--blue); }
        .nav-back { font-size: 14px; font-weight: 500; color: var(--mid); text-decoration: none; transition: 0.2s; }
        .nav-back:hover { color: var(--ink); }

        /* HEADER */
        .header-section { padding: 140px 56px 40px; text-align: center; }
        .header-h1 { font-family: 'Fraunces', serif; font-weight: 900; font-size: clamp(32px, 4vw, 48px); margin-bottom: 16px; letter-spacing: -1px; }
        .header-p { font-size: 16px; color: var(--mid); max-width: 500px; margin: 0 auto; line-height: 1.6; }

        /* FORMULAIRE */
        .form-container { 
            max-width: 700px; 
            margin: 0 auto 80px; 
            background: var(--white); 
            padding: 48px; 
            border-radius: 32px; 
            border: 1px solid var(--mist); 
            box-shadow: 0 20px 40px rgba(11,15,26,0.03); 
        }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: var(--ink); }
        input, select, textarea { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid var(--mist); 
            border-radius: 12px; 
            font-family: 'Outfit', sans-serif; 
            font-size: 15px; 
            background: #FAFBFF; 
            color: var(--ink); 
            transition: border-color 0.2s; 
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); background: var(--white); }
        textarea { height: 120px; resize: vertical; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-submit { 
            display: block; 
            width: 100%; 
            padding: 18px; 
            background: var(--ink); 
            color: var(--white); 
            border: none; 
            border-radius: 100px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 32px; 
        }
        .btn-submit:hover { 
            background: var(--blue); 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(18,70,230,0.2); 
        }

        /* FOOTER */
        footer { background: var(--ink); color: white; padding: 60px 56px 40px; border-radius: 60px 60px 0 0; }
        .footer-flex { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .footer-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; margin-left: 24px; transition: 0.2s; }
        .footer-links a:hover { color: white; }

        @media (max-width: 768px) {
            nav, .header-section, footer { padding-left: 24px; padding-right: 24px; }
            .form-container { padding: 32px 24px; border-radius: 24px; margin: 0 24px 60px; }
            .grid-2 { grid-template-columns: 1fr; }
            .footer-flex { flex-direction: column; gap: 24px; text-align: center; }
            .footer-links a { margin: 0 12px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="../index.html" class="nav-logo">
        <span class="nav-logo-text">Foot<span>lio</span></span>
    </a>
    <a href="../index.html" class="nav-back">← Retour au site</a>
</nav>

<div class="header-section">
    <h1 class="header-h1">Espace Joueur</h1>
    <p class="header-p">Transmets-nous tes statistiques, tes photos et tes vidéos pour que notre équipe commence le design de ton site.</p>
</div>

<div class="form-container">
    <form>
        <div class="grid-2">
            <div class="form-group">
                <label>Ton nom complet</label>
                <input type="text" placeholder="Prénom Nom">
            </div>
            <div class="form-group">
                <label>Ton poste exact</label>
                <input type="text" placeholder="Ex: Milieu offensif central">
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Club actuel</label>
                <input type="text" placeholder="Nom du club">
            </div>
            <div class="form-group">
                <label>Catégorie / Âge</label>
                <input type="text" placeholder="Ex: U19 Nationaux">
            </div>
        </div>

        <div class="form-group">
            <label>Ta biographie (Ce qui te démarque)</label>
            <textarea placeholder="Parle-nous de ton profil, tes points forts, ton parcours de formation..."></textarea>
        </div>

        <div class="form-group">
            <label>Lien vers tes vidéos (Highlights YouTube, Drive...)</label>
            <input type="url" placeholder="https://...">
        </div>

        <div class="form-group">
            <label>Lien vers tes photos de match (Google Drive, Dropbox...)</label>
            <input type="url" placeholder="https://...">
        </div>

        <button type="button" class="btn-submit" onclick="alert('Dossier envoyé avec succès ! Ton site sera prêt sous 48h.')">
            Envoyer mon dossier
        </button>
    </form>
</div>

<footer>
    <div class="footer-flex">
        <div class="nav-logo-text" style="color: white; font-size: 20px;">Foot<span>lio</span></div>
        <div class="footer-links">
            <a href="../index.html">Accueil</a>
            <a href="mailto:contact@footlio.fr">Nous contacter</a>
        </div>
    </div>
    <div style="text-align: center; margin-top: 40px; font-size: 13px; color: rgba(255,255,255,0.4);">
        © 2026 Footlio. Tous droits réservés.
    </div>
</footer>

</body>
</html>
