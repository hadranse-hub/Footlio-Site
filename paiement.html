<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Footlio — Paiement Sécurisé</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0B0F1A; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .pay-card { background: #1E2740; padding: 40px; border-radius: 24px; width: 100%; max-width: 450px; }
        .price-tag { font-size: 48px; font-weight: 700; margin: 20px 0; text-align: center; }
        .secure-badge { background: rgba(74, 222, 128, 0.1); color: #4ADE80; padding: 6px 12px; border-radius: 100px; font-size: 12px; display: inline-block; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: #0B0F1A; border: 1px solid #303952; border-radius: 8px; color: white; }
        .btn-pay { width: 100%; padding: 16px; background: #1246E6; color: white; border: none; border-radius: 100px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="pay-card">
        <div class="secure-badge">🔒 Paiement 100% sécurisé</div>
        <h2>Finalise ta commande</h2>
        <div class="price-tag">149€</div>
        <input type="text" placeholder="Numéro de carte">
        <div style="display:flex; gap:10px;">
            <input type="text" placeholder="MM/AA">
            <input type="text" placeholder="CVC">
        </div>
        <button class="btn-pay" onclick="alert('Paiement validé ! Redirection vers l\'onboarding...')">Payer maintenant</button>
    </div>
</body>
</html>
