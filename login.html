<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Footlio — Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #F7F8FC; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #6B7499; font-size: 14px; margin-bottom: 32px; }
        input { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid #E8ECF8; border-radius: 12px; font-size: 16px; }
        .btn-login { width: 100%; padding: 14px; background: #1246E6; color: white; border: none; border-radius: 100px; font-weight: 600; cursor: pointer; text-decoration: none; display: block; }
        .footer-link { margin-top: 24px; font-size: 13px; color: #6B7499; }
        .footer-link a { color: #1246E6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Prêt pour le terrain ?</h1>
        <p>Inscris-toi pour personnaliser ton site.</p>
        <input type="text" placeholder="Prénom et Nom">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Mot de passe">
        <a href="paiement.html" class="btn-login">Créer mon compte</a>
        <div class="footer-link">Déjà un compte ? <a href="#">Se connecter</a></div>
    </div>
</body>
</html>
